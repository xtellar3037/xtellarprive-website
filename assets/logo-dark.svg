<?xml version="1.0" encoding="UTF-8"?>
<svg width="500" height="500" viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
<defs>
  <filter id="glow">
    <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
    <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="softglow">
    <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
    <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
</defs>

<!-- Background -->
<rect width="500" height="500" fill="#0A0A0A"/>

<!-- Star mark centred at 250,200 scale ~2.8x -->
<g transform="translate(250,195)">
  <polygon points="0,-82 14.3,-29.8 64.1,-51.2 32.2,-7.3 79.9,18.3 25.8,20.6 35.5,74 0,33 -35.5,74 -25.8,20.6 -79.9,18.3 -32.2,-7.3 -64.1,-51.2 -14.3,-29.8" fill="#0e0b05"/>
  <!-- Layer 3 -->
  <g transform="rotate(40) scale(0.68)">
    <polygon points="0,-82 14.3,-29.8 64.1,-51.2 32.2,-7.3 79.9,18.3 25.8,20.6 35.5,74 0,33 -35.5,74 -25.8,20.6 -79.9,18.3 -32.2,-7.3 -64.1,-51.2 -14.3,-29.8" fill="none" stroke="#C9A96E" stroke-width="0.9" opacity="0.38"/>
  </g>
  <!-- Layer 2 -->
  <g transform="rotate(18) scale(0.88)">
    <polygon points="0,-82 14.3,-29.8 64.1,-51.2 32.2,-7.3 79.9,18.3 25.8,20.6 35.5,74 0,33 -35.5,74 -25.8,20.6 -79.9,18.3 -32.2,-7.3 -64.1,-51.2 -14.3,-29.8" fill="none" stroke="#C9A96E" stroke-width="1.15" opacity="0.65"/>
  </g>
  <!-- Layer 1 -->
  <polygon points="0,-82 14.3,-29.8 64.1,-51.2 32.2,-7.3 79.9,18.3 25.8,20.6 35.5,74 0,33 -35.5,74 -25.8,20.6 -79.9,18.3 -32.2,-7.3 -64.1,-51.2 -14.3,-29.8" fill="none" stroke="#C9A96E" stroke-width="1.7" filter="url(#glow)"/>
  <!-- 7 dots -->
  <circle cx="0" cy="-82" r="2.5" fill="#C9A96E" filter="url(#softglow)"/>
  <circle cx="64.1" cy="-51.2" r="2.5" fill="#C9A96E" filter="url(#softglow)"/>
  <circle cx="79.9" cy="18.3" r="2.5" fill="#C9A96E" filter="url(#softglow)"/>
  <circle cx="35.5" cy="74" r="2.5" fill="#C9A96E" filter="url(#softglow)"/>
  <circle cx="-35.5" cy="74" r="2.5" fill="#C9A96E" filter="url(#softglow)"/>
  <circle cx="-79.9" cy="18.3" r="2.5" fill="#C9A96E" filter="url(#softglow)"/>
  <circle cx="-64.1" cy="-51.2" r="2.5" fill="#C9A96E" filter="url(#softglow)"/>
  <!-- X arms -->
  <polygon points="0,0 -2.5,-3 -9,-9 -3,-2.5" fill="#C9A96E" opacity="0.9"/>
  <polygon points="0,0 2.5,-3 9,-9 3,-2.5" fill="#C9A96E" opacity="0.9"/>
  <polygon points="0,0 2.5,3 9,9 3,2.5" fill="#C9A96E" opacity="0.9"/>
  <polygon points="0,0 -2.5,3 -9,9 -3,2.5" fill="#C9A96E" opacity="0.9"/>
  <!-- Serif P -->
  <line x1="-2" y1="-5.5" x2="-2" y2="5.5" stroke="#C9A96E" stroke-width="1.05" stroke-linecap="round"/>
  <line x1="-3.5" y1="-5.5" x2="-0.5" y2="-5.5" stroke="#C9A96E" stroke-width="0.7" stroke-linecap="round" opacity="0.85"/>
  <line x1="-3.5" y1="5.5" x2="-0.5" y2="5.5" stroke="#C9A96E" stroke-width="0.7" stroke-linecap="round" opacity="0.85"/>
  <path d="M -2,-5.5 Q 6.5,-5.5 6.5,-2.5 Q 6.5,0.5 -2,0.5" fill="none" stroke="#C9A96E" stroke-width="1.05" stroke-linecap="round"/>
</g>

<!-- Divider -->
<line x1="110" y1="318" x2="208" y2="318" stroke="#C9A96E" stroke-width="0.5" opacity="0.45"/>
<polygon points="250,312 255,318 250,324 245,318" fill="#C9A96E" opacity="0.8"/>
<line x1="292" y1="318" x2="390" y2="318" stroke="#C9A96E" stroke-width="0.5" opacity="0.45"/>

<!-- Wordmark -->
<text x="250" y="368" text-anchor="middle" font-family="Georgia, serif" font-size="40" font-weight="400" fill="#E8D5A3" letter-spacing="14">XTELLAR</text>
<text x="250" y="402" text-anchor="middle" font-family="Georgia, serif" font-size="18" font-weight="300" fill="#C9A96E" letter-spacing="20">PRIVÉ</text>
<line x1="155" y1="420" x2="345" y2="420" stroke="#1e1608" stroke-width="0.6"/>
<text x="250" y="465" text-anchor="middle" font-family="Georgia, serif" font-size="8" fill="#1e1608" letter-spacing="4">UEN 202303777R · SINGAPORE</text>
</svg>